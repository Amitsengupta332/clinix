<section class="bg-[#f5f5f5] py-16">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="grid items-center gap-12 lg:grid-cols-2">
      <div class="flex justify-center">
        <img
          src="./assets/images/about4.png"
          alt="Contact Us"
          class="h-auto max-w-full object-contain"
        />
      </div>

      <div>
        <p class="mb-3 text-sm font-medium text-[#2f80ed]">
          Have you Any Question?
        </p>

        <h2 class="text-3xl font-extrabold leading-tight text-[#0b2c8f] sm:text-4xl">
          You Can Contact Us <br />
          <span class="font-medium">If You Have Any Query</span>
        </h2>

        <form class="mt-8 space-y-4">
          <div class="grid gap-4 sm:grid-cols-2">
            <input
              type="text"
              placeholder="Name*"
              class="h-12 w-full border border-gray-300 bg-white px-4 text-sm outline-none transition focus:border-[#2f80ed]"
            />
            <input
              type="text"
              placeholder="Phone*"
              class="h-12 w-full border border-gray-300 bg-white px-4 text-sm outline-none transition focus:border-[#2f80ed]"
            />
          </div>

          <div class="grid gap-4 sm:grid-cols-2">
            <input
              type="email"
              placeholder="E-mail*"
              class="h-12 w-full border border-gray-300 bg-white px-4 text-sm outline-none transition focus:border-[#2f80ed]"
            />

            <select
              class="h-12 w-full border border-gray-300 bg-white px-4 text-sm text-gray-500 outline-none transition focus:border-[#2f80ed]"
            >
              <option>Select Service</option>
              <option>Office Cleaning</option>
              <option>Floor Cleaning</option>
              <option>Gutter Cleaning</option>
              <option>Toilet Cleaning</option>
              <option>House Cleaning</option>
              <option>Kitchen Cleaning</option>
            </select>
          </div>

          <textarea
            rows="5"
            placeholder="Write Comment . . ."
            class="w-full resize-none border border-gray-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-[#2f80ed]"
          ></textarea>

          <button
            type="submit"
            class="inline-flex items-center gap-2 bg-[#2f80ed] px-6 py-3 text-sm font-medium text-white transition hover:bg-[#1d6fe0]"
          >
            Submit Now
            <span>&#8250;</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
